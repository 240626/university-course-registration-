<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Registration System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="registration-container">
        <h2>Course Registration</h2>
        
        <div class="section">
            <h3>Available Courses</h3>
            <div class="courses-list" id="available-courses"></div>
        </div>

        <div class="section">
            <h3>My Registered Courses</h3>
            <ul class="registered-list" id="registered-courses"></ul>
            <div class="total-credits">Total Credits: <span id="total-credits-val">0</span></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
